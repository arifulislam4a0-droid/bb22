<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>নতুন একাউন্ট</title>
  <style>
    :root {
      --primary: #1f7a46;
      --soft: #eefaf2;
      --dark: #10331d;
      --card: #fff;
      --muted: #5f6f65
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui;
      background: linear-gradient(180deg, #f7fff8, #ebfff3);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
      color: var(--dark)
    }

    .card {
      width: min(100%, 450px);
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(16, 51, 29, .08);
      border: 1px solid #dff0e6
    }

    h1 {
      margin: 0 0 8px
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted)
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700
    }

    .input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cfe5d6;
      border-radius: 12px;
      font-size: 16px
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      margin-top: 18px
    }

    .link {
      text-align: center;
      margin-top: 16px
    }

    .link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>নতুন একাউন্ট তৈরি করুন</h1>
    <p class="sub">নাম, মোবাইল নম্বর ও পাসওয়ার্ড দিয়ে রেজিস্ট্রেশন করুন</p>
    <form id="registerForm">
      <label>নাম</label><input class="input" id="name" required />
      <label>মোবাইল নম্বর</label><input class="input" id="phone" required />
      <label>পাসওয়ার্ড</label><input class="input" id="password" type="password" required />
      <label>আবার পাসওয়ার্ড লিখুন</label><input class="input" id="confirmPassword" type="password" required />
      <button class="btn" id="submitBtn" type="submit">সাবমিট</button>
    </form>
    <div class="link">আগে থেকেই একাউন্ট থাকলে <a href="login.html">লগইন করুন</a></div>
  </div>
  <script>
    const API_BASE = 'https://ss-va1s.onrender.com/api';
    function normalizePhone(input) {
      const value = String(input || '').replace(/\s+/g, '').replace(/[^0-9+]/g, '');
      if (value.startsWith('+880')) return '0' + value.slice(4);
      if (value.startsWith('880')) return '0' + value.slice(3);
      return value;
    }
    if (localStorage.getItem('userToken')) location.href = 'index.html';
    const registerForm = document.getElementById('registerForm');
    const nameInput = document.getElementById('name');
    const phone = document.getElementById('phone');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      try {
        const payload = {
          name: nameInput.value.trim(),
          phone: normalizePhone(phone.value),
          password: password.value,
          confirmPassword: confirmPassword.value
        };
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'রেজিস্ট্রেশন হয়নি');
        localStorage.setItem('userToken', data.token);
        localStorage.setItem('userInfo', JSON.stringify(data.user));
        alert(data.message);
        location.href = 'index.html';
      } catch (err) {
        alert(err.message);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
